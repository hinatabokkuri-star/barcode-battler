<style>

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --red: #c0392b;
    --bg: #0a0a0f;
    --bg2: #11111a;
    --bg3: #1a1a28;
    --text: #e8e0d0;
    --text-dim: #8a8070;
    --border: #2a2a3a;
    --green: #27ae60;
    --blue: #2980b9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ヘッダー */
  .hero {
    position: relative;
    text-align: center;
    padding: 80px 20px 60px;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%);
  }
  .hero-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 4px;
    padding: 6px 20px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .hero h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(32px, 8vw, 72px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .hero h1 span {
    color: var(--gold);
  }
  .hero-sub {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 2px;
  }
  .hero-divider {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 32px auto;
    opacity: 0.5;
  }

  /* セクション共通 */
  .section {
    max-width: 900px;
    margin: 0 auto 80px;
    padding: 0 20px;
  }
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .section-heading {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  /* 統計カード */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    margin-bottom: 60px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 24px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.3s;
  }
  .stat-card:hover { border-color: var(--gold); }
  .stat-card:hover::after { transform: scaleX(1); }
  .stat-num {
    font-family: 'Noto Serif JP', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .stat-num.red { color: var(--red); }
  .stat-num.green { color: var(--green); }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 8px;
  }

  /* 累積PTグラフ */
  .chart-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 32px 24px;
    position: relative;
    overflow: hidden;
  }
  #ptChart {
    width: 100%;
    height: 300px;
  }
  .chart-legend {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* 名勝負列伝 */
  .legend-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .legend-item-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 24px 28px;
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 20px;
    align-items: center;
    transition: background 0.2s;
    cursor: default;
  }
  .legend-item-card:first-child { border-radius: 4px 4px 0 0; }
  .legend-item-card:last-child { border-bottom: 1px solid var(--border); border-radius: 0 0 4px 4px; }
  .legend-item-card:hover { background: var(--bg3); }
  .legend-emoji {
    font-size: 32px;
    text-align: center;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.4));
  }
  .legend-body {}
  .legend-num {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .legend-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .legend-detail {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .legend-date {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* ヒートマップ */
  .heatmap-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 32px 24px;
    overflow-x: auto;
  }
  .heatmap-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 4px;
    min-width: 500px;
  }
  .heatmap-table th {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    padding: 8px 12px;
    font-weight: 400;
    text-align: center;
  }
  .heatmap-table th.row-header {
    text-align: left;
    white-space: nowrap;
  }
  .heatmap-cell {
    padding: 16px 12px;
    text-align: center;
    border-radius: 2px;
    position: relative;
    transition: transform 0.2s;
    cursor: default;
  }
  .heatmap-cell:hover { transform: scale(1.05); z-index: 10; }
  .cell-rank {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .cell-detail {
    font-size: 10px;
    margin-top: 4px;
    opacity: 0.7;
  }
  .heatmap-col-header {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    padding: 4px 0 12px;
  }
  .heatmap-note {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 16px;
    line-height: 1.8;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .badge-gold { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid var(--gold); }
  .badge-red { background: rgba(192,57,43,0.2); color: #e74c3c; border: 1px solid #c0392b; }

  /* フッター */
  .footer {
    text-align: center;
    padding: 60px 20px 40px;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
    border-top: 1px solid var(--border);
  }

  /* アニメーション */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up {
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }
  .delay-4 { animation-delay: 0.4s; }
</style>
</head>

// ===== 累積PTグラフ =====
const canvas = document.getElementById('ptChart');
const ctx = canvas.getContext('2d');

function drawChart() {
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const pts = [];
  let cum = 0;
  games.forEach(g => { cum += g.pt; pts.push(cum); });

  const minVal = Math.min(0, ...pts);
  const maxVal = Math.max(0, ...pts);
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const toX = i => pad.left + (i / (pts.length-1)) * cw;
  const toY = v => pad.top + ch - ((v - minVal) / (maxVal - minVal)) * ch;

  // ゼロライン
  const zeroY = toY(0);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(pad.left, zeroY);
  ctx.lineTo(pad.left + cw, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);

  // グラジェント塗り
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, 'rgba(201,168,76,0.3)');
  grad.addColorStop(1, 'rgba(201,168,76,0.02)');
  ctx.beginPath();
  ctx.moveTo(toX(0), zeroY);
  pts.forEach((v,i) => ctx.lineTo(toX(i), toY(v)));
  ctx.lineTo(toX(pts.length-1), zeroY);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // ライン
  ctx.beginPath();
  pts.forEach((v,i) => i===0 ? ctx.moveTo(toX(i),toY(v)) : ctx.lineTo(toX(i),toY(v)));
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 2;
  ctx.stroke();

  // マイルストーン点
  const msIds = [19,23,75,87,92];
  msIds.forEach(id => {
    const idx = id - 1;
    const x = toX(idx);
    const y = toY(pts[idx]);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fillStyle = '#c9a84c';
    ctx.fill();
    ctx.strokeStyle = '#0a0a0f';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // 軸ラベル
  ctx.fillStyle = 'rgba(138,128,112,0.8)';
  ctx.font = `${10 * devicePixelRatio / devicePixelRatio}px sans-serif`;
  ctx.textAlign = 'right';
  [0, Math.round(maxVal/2), maxVal, minVal].forEach(v => {
    const y = toY(v);
    if (y > pad.top && y < H - pad.bottom) {
      ctx.fillText(v, pad.left - 6, y + 4);
    }
  });

  // x軸ラベル（局数）
  ctx.textAlign = 'center';
  [1, 25, 50, 75, 100].forEach(n => {
    const x = toX(n-1);
    ctx.fillText(n + '局', x, H - pad.bottom + 16);
  });
}
drawChart();
window.addEventListener('resize', drawChart);

// ===== 名勝負列伝 =====
document.getElementById('legendList').innerHTML = milestones.map(m=>`
  <div class="legend-item-card">
    <div class="legend-emoji">${m.emoji}</div>
    <div class="legend-body">
      <div class="legend-num">#${m.id}</div>
      <div class="legend-title">${m.title}</div>
      <div class="legend-detail">${m.detail}</div>
    </div>
    <div class="legend-date">${m.date.replace('2026-','').replace('-','/')}</div>
  </div>
`).join('');

// ===== ヒートマップ =====
function rankColor(avg) {
  // 1.0(最良)〜3.5(最悪) → gold〜red
  const t = Math.max(0, Math.min(1, (avg - 1.0) / 2.5));
  if (t < 0.33) return `rgba(201,168,76,${0.6 - t*0.3})`;
  if (t < 0.66) return `rgba(60,80,120,${0.4})`;
  return `rgba(192,57,43,${0.3 + t*0.3})`;
}
function rankTextColor(avg) {
  if (avg <= 2.0) return '#e8c97a';
  if (avg <= 2.5) return '#e8e0d0';
  return '#e07070';
}

const cols = ['弱卓 (〜2.5)', '中卓 (2.5〜3.5)', '強卓 (3.5〜)'];
const colKeys = ['weak', 'mid', 'strong'];

let html = '<thead><tr><th class="row-header">時間帯</th>';
cols.forEach(c => html += `<th class="heatmap-col-header">${c}</th>`);
html += '</tr></thead><tbody>';

heatmapData.forEach(row => {
  html += `<tr><td style="padding:8px 12px;font-size:13px;white-space:nowrap;color:var(--text-dim)">${row.tz}</td>`;
  colKeys.forEach(k => {
    const d = row[k];
    const bg = rankColor(d.avg);
    const tc = rankTextColor(d.avg);
    const isGolden = d.last === 0 && d.avg < 2.2;
    html += `
      <td class="heatmap-cell" style="background:${bg}">
        <div class="cell-rank" style="color:${tc}">${d.avg.toFixed(2)}</div>
        <div class="cell-detail" style="color:${tc}">
          ${d.games}局 ${isGolden ? '⭐' : ''}<br>1位:${d.top} / 4位:${d.last}
        </div>
      </td>`;
  });
  html += '</tr>';
});
html += '</tbody>';
document.getElementById('heatmapTable').innerHTML = html;
</script>
